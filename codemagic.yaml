workflows:
  android-workflow:
    name: Android Capacitor Build
    instance_type: mac_mini_m1
    environment:
      java: 21
      node: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build Web App
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Build Android App Bundle
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
